<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="p-5">
    <h1>Ваша корзина</h1>
    <hr>
    <div id="cart-list" class="mb-4">
    </div>
    <h3>Итого: <span id="total-price">0</span>$</h3>
    <br>
    <button class="btn btn-danger" onclick="clearCart()">Очистить корзину</button>
    <a href="project.html" class="btn btn-secondary">Вернуться в магазин</a>

    <script>
    function renderCart() {
        const cartList = document.getElementById('cart-list');
        const totalSpan = document.getElementById('total-price');
        const cart = JSON.parse(localStorage.getItem('myCart')) || [];
        
        if (cart.length === 0) {
            cartList.innerHTML = '<h3>Корзина пуста :(</h3>';
            totalSpan.innerText = '0';
            return;
        }

        let html = '<ul class="list-group">';
        let total = 0;

        cart.forEach((item, index) => {
            const sum = item.price * item.count;
            total += sum;
            html += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    ${item.name} (x${item.count})
                    <span>${sum.toFixed(2)}$</span>
                </li>`;
        });

        html += '</ul>';
        cartList.innerHTML = html;
        totalSpan.innerText = total.toFixed(2);
    }

    function clearCart() {
        localStorage.removeItem('myCart');
        renderCart();
    }
    renderCart();
    </script>
</body>
</html>
