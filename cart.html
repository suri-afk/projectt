<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pochti oligarh - Корзина</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="cart.css"/>
</head>
<body class="p-5">
    <h1>Ваша корзина</h1>
    <hr>  
    <div id="cart-list" class="mb-4">
    </div>
    <div class="d-flex-align-items-center"></div>
    <h3>Итого: <span id="total-price">0</span>$</h3>  
    <div class="mt-4">
        <button class="btn btn-danger" onclick="clearCart()">Очистить корзину</button>
        <a href="project.html" class="btn btn-secondary">Вернуться в магазин</a>
    </div>
    <script>
    function changeCount(index, op) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        
        if (cart[index]) {
            cart[index].count = parseInt(cart[index].count) + op;
            if (cart[index].count <= 0) {
                cart.splice(index, 1);
            }
        }

        localStorage.setItem('myCart', JSON.stringify(cart));
        renderCart();
    } 
    function renderCart() {
        const cartList = document.getElementById('cart-list');
        const totalSpan = document.getElementById('total-price');
        const cart = JSON.parse(localStorage.getItem('myCart')) || [];
        if (cart.length === 0) {
            cartList.innerHTML = '<h3>Корзина пуста. </h3>';
            totalSpan.innerText = '0';
            return;
        }
        let html = '<div class="list-group">';
        let total = 0;
        cart.forEach((item, index) => {
            const sum = item.price * item.count;
            total += sum;
            
            html += `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div class="d-flex-align-items-center" >
                        <img src="${item.image}" class="cart-img me-3" alt="product">  <div class="d-flex-align-items-center">
                    </div>
                        <div>
                            <h5 class="mb-0">${item.name}</h5>
                            <button class="btn btn-sm btn-outline-secondary qty-btn" onclick="changeCount(${index}, -1)">-</button>
                        <span class="mx-3 fw-bold">${item.count}</span>
                        <button class="btn btn-sm btn-outline-secondary qty-btn" onclick="changeCount(${index}, 1)">+</button>
                        <span class="fw-bold">${sum.toFixed(2)}$</span>
                        </div>
                    </div>
                </div>`;
        });

        html += '</div>';
        cartList.innerHTML = html;
        totalSpan.innerText = total.toFixed(2);
    }

    function clearCart() {
        if(confirm("ты снова станешь нищетой, если очистишь корзину. очистить?")) {
            localStorage.removeItem('myCart');
            renderCart();
        }
    }
    renderCart();
    </script>
</body>
</html>
